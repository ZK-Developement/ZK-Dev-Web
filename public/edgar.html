<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawo Edgar</title>
    <link rel="icon" href="edgar.jpg" type="icon/png">
</head>
<style>
    img
    {
        width: 60vh;
        border-radius: 20%;
        transition: 2s;
    }
    img:hover
    {
        transform: rotate(-720deg) scale(0.5) translateY(-5vh);
    }
    p
    {
        font-family: 'Courier New', Courier, monospace;
        transform: translateY(-20vh);
        color: rgb(27, 27, 27);
    }
</style>
<body>
    <center>
    <img src="edgar.jpg" alt="edgar">
    <p>Brawo Edgar</p>
    </center>
</body>
</html>
